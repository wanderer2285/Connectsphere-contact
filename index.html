<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConnectSphere Solutions — Contact Us</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; margin-bottom: 8px; color: #1a1a2e; }
    p.subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #333; }
    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    textarea { resize: vertical; min-height: 110px; }
    button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    #message-box {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #message-box.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    #message-box.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Contact ConnectSphere</h1>
    <p class="subtitle">Fill out the form and we'll get back to you shortly.</p>

    <form id="contact-form">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required>

      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Tell us how we can help..." required></textarea>

      <button type="submit">Send message</button>
    </form>

    <div id="message-box"></div>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const msgBox = document.getElementById('message-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // Stop the default page reload

      const data = {
        name:    document.getElementById('name').value.trim(),
        email:   document.getElementById('email').value.trim(),
        message: document.getElementById('message').value.trim(),
      };

      try {
        const response = await fetch('/contact-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await response.json();

        msgBox.style.display = 'block';
        if (response.ok) {
          msgBox.className = 'success';
          msgBox.textContent = result.message;
          form.reset();
        } else {
          msgBox.className = 'error';
          msgBox.textContent = result.message;
        }
      } catch (err) {
        msgBox.style.display = 'block';
        msgBox.className = 'error';
        msgBox.textContent = 'Something went wrong. Please try again.';
      }
    });
  </script>
</body>
</html>
